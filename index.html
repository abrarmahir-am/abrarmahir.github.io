<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABRAR MAHIR</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
    }

    header {
      background: #1e293b;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .hero {
      text-align: center;
      padding: 80px 20px;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
    }

    .hero h1 {
      font-size: 40px;
    }

    .hero p {
      margin-top: 10px;
      font-size: 18px;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: white;
      color: black;
      text-decoration: none;
      border-radius: 25px;
      font-weight: bold;
    }

    section {
      padding: 40px 20px;
      text-align: center;
    }

    .skills span {
      display: inline-block;
      background: #334155;
      margin: 5px;
      padding: 10px 15px;
      border-radius: 20px;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #1e293b;
    }
  </style>
</head>

<body>

  <header>
    ABRAR MAHIR
  </header>

  <div class="hero">
    <h1>Hello, I am AM15 💌</h1>
    <p>A Web Developer</p>
    <a class="btn" href="#">Contact Me: abrarmahir445@gmail.com</a>
  </div>

  <section>
    <h2>About Me</h2>
    <p>I am learning web development and building cool websites.</p>
  </section>

  <section>
    <h2>My Skills</h2>
    <div class="skills">
      <span>HTML</span>
      <span>CSS</span>
      <span>JavaScript</span>
      <span>AI</span>
    </div>
  </section>

  <section>
    <h2>Projects</h2>
    <div class="projects">
      <div class="card">Project 1</div>
      <div class="card">Project 2</div>
      <div class="card">Project 3</div>
    </div>
  </section>

  <footer>
    © 2026 ABRAR MAHIR | All Rights Reserved
  </footer>

</body>
</html>
